<!DOCTYPE html>
<html>
<head>
  <title>Zenvora Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f1f3f6;
    }

    .header{
      background:#2874f0;
      padding:15px;
      color:white;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .search{
      padding:10px;
      background:white;
    }

    .search input{
      width:100%;
      padding:12px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .banner{
      background:white;
      margin:10px;
      padding:15px;
      border-radius:10px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .products{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .card{
      background:white;
      padding:10px;
      border-radius:10px;
      text-align:center;
    }

    .card img{
      width:100%;
      border-radius:10px;
    }

    .btn{
      background:#2874f0;
      color:white;
      padding:10px;
      border:none;
      border-radius:5px;
      width:100%;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="header">
  Zenvora Store
</div>

<div class="search">
  <input type="text" placeholder="Search products">
</div>

<div class="banner">
  Welcome to My Digital Store 🚀
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Netflix Account</h3>
    <p>₹99</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Canva Pro</h3>
    <p>₹149</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>ChatGPT Premium</h3>
    <p>₹199</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Spotify Premium</h3>
    <p>₹79</p>
    <button class="btn">Buy Now</button>
  </div>

</div>

</body>
</html>
